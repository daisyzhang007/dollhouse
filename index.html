<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelHome - Collaboration Gallery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏠 PixelHome Architect</h1>
        <div id="auth-area">
            <button id="login-btn">Login with Google</button>
            <span id="user-display"></span>
        </div>
    </header>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <textarea id="description" placeholder="Describe your room design..."></textarea>
        <button id="save-btn">Save to Community Gallery</button>
    </div>

    <hr>

    <section class="gallery-section">
        <h2>🏘️ Community Masterpieces</h2>
        <div id="gallery-container">
            </div>
    </section>

    <script type="module" src="sketch.js"></script>

</body>
</html>
